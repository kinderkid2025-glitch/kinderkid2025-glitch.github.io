
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login AssitantIAJVVVL</title>
    <style>
        /* Centrado absoluto en toda la página */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a; /* Fondo oscuro elegante */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estilos del botón */
        .btn-login {
            position: relative;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            /* Degradado estilo moderno */
            background: linear-gradient(45deg, #ff0080, #7928ca);
            background-size: 200% auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            outline: none;
            animation: pulse 2s infinite; /* Animación constante */
        }

        /* Efecto al pasar el mouse (Hover) */
        .btn-login:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 0, 128, 0.4);
            background-position: right center;
        }

        /* Efecto al hacer clic */
        .btn-login:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Animación de pulso suave */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(121, 40, 202, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(121, 40, 202, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(121, 40, 202, 0);
            }
        }

    
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: all 0.6s;
        }

        .btn-login:hover::before {
            left: 100%;
        }
    </style>
</head>
    
<body>
<script src="https://js.puter.com/v2/"></script>

    <button class="btn-login" id="sign-in" style="display: block;">
        Login
    </button>
     <a class="btn-login" id="a-btn-lg" href="" style="display: none; text-decoration: none;">
        Open App / Abrir App
    </a>
    <!-- <a href="intent://alberto2040.github.io/auth#Intent;scheme=https;package=com.jvvl.netrox_ia;end">
  <!-- Login -->
</a> -->

        <script>

       document.getElementById('sign-in').addEventListener('click', async () => {

       
            try{

                alert("fuincion disparada 4");

                history.pushState({ page: "login" }, "", "/");

                 // window.location.href = "https://alberto2040.github.io/auth";

                let user     = await puter.auth.signIn();
                
                puter.print('<div id="user-data" hidden>' + JSON.stringify(user) + '</div>');
                

                if (user && Object.keys(user).length > 0) {

                    document.getElementById('a-btn-lg').style.display = "block";
                    document.getElementById('sign-in').style.display = "none";
                    document.getElementById('a-btn-lg').href= "https://alberto2040.github.io/auth?code=" +  JSON.stringify(user);
                    alert("seteo los valores en las etiquetas");
                    history.back();
                    // window.location.href = "https://kinderkid2025-glitch.github.io"
                
                } else if (error) {
                    window.location.href = "https://kinderkid2025-glitch.github.io";
                }
            }catch(error){
                puter.print('Error:<br>' + JSON.stringify(error));
            }

        });
        
    </script>

    <!-- <script src="HDgshka.js"> -->
    <!-- </script> -->

</body>
</html>
