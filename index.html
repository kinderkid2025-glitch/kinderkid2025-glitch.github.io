<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netrox-IA</title>
    <style>
        /* Centrado absoluto en toda la página */

        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }


        .btn-login {

            position: absolute;

            inset: 0;

            margin: auto;

            width: min(46%, 260px);
            height: 70px;

            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-size: 18px;
            font-weight: bold;
            color: white;

            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;

            border: none;
            border-radius: 50px;

            text-decoration: none;
            box-sizing: border-box;

            background: linear-gradient(45deg, #ff0080, #7928ca);
            background-size: 200% auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);

            outline: none;

            animation: pulse 2s infinite;

            transition: transform 0.4s ease;

        }

        .a-btn-login {

            overflow: hidden;
            outline: none;
            animation: pulse 2s infinite;
            transition: transform 0.4s ease;
            background: linear-gradient(45deg, #ff0080, #7928ca);
            background-size: 200% auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
            align-items: center;
            justify-content: center;
            text-align: center;
            inset: 0;
            margin: auto;
            position: relative;
            border-radius: 50px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: bold;

        }

        .n-trox {
            text-align: center;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 10%;
            width: min(70%, 460px);
            color: white;
            position: absolute;
            font-weight: bold;
            font-size: clamp(20px, 4vw, 24px);
        }

        .content-a {
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            width: min(70%, 460px);
        }

        /* Efecto al pasar el mouse (Hover) */
        .btn-login:hover,
        .a-btn-login:hover {
            /* transition: all 0.4s ease; */
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 0, 128, 0.4);
            background-position: right center;
        }

        /* Efecto al hacer clic */
        .btn-login:active,
        .a-btn-login:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Animación de pulso suave */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(121, 40, 202, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(121, 40, 202, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(121, 40, 202, 0);
            }
        }


        .btn-login::before,
        .a-btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            transition: all 0.6s;
        }

        .btn-login:hover::before {
            left: 100%;
        }
    </style>
</head>

<body>

    <script>
        alert("User Agent Kinder5:");

        var a =  '<button class="btn-login" id="in" style="display: block;"> Login </button>'
        
        if (!/Android/i.test(navigator.userAgent)) {
            
                document.body.innerHTML = a;
                window.stop();
                throw new Error("");
           
        }
        
        window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
        });
        
    </script>
    <script src="https://js.puter.com/v2/"></script>

    <div class="n-trox">NETROX-IA</div>

    <button class="btn-login" id="sign-in" style="display: block;">
        Login
    </button>

    <div style="position: absolute;" class="content-a">
        <a class="a-btn-login" id="a-btn-lg" href=""
            style="display: none; text-decoration: none; font-size: clamp(8px, 4vw, 24px);">
            Open App/Abrir App
        </a>
    </div>


    <script>
        
        document.getElementById('sign-in').addEventListener('click', async () => {


            try {

                history.pushState({ page: "login" }, "", "/");

                let user = await puter.auth.signIn();

                puter.print('<div id="user-data" hidden>' + JSON.stringify(user) + '</div>');


                if (user && Object.keys(user).length > 0) {

                    document.getElementById('a-btn-lg').style.display = "block";
                    document.getElementById('sign-in').style.display = "none";
                    document.getElementById('a-btn-lg').href = "https://alberto2040.github.io/auth?code=" + JSON.stringify(user);
                    history.back();

                } else if (error) {
                    window.location.href = "https://kinderkid2025-glitch.github.io";
                }
            } catch (error) {
                puter.print('Error:<br>' + JSON.stringify(error));
            }

        });

    </script>

    <!-- <script src="HDgshka.js"> -->
    <!-- </script> -->

</body>

</html>
