<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="https://js.puter.com/v2/"></script>
    
    <script>
       
        function onclickSignIn(datos) {
            let user = await puter.auth.signIn();
            puter.print('<div id="user-data" hidden>' + JSON.stringify(user) + '</div>');
            return user;
        }
    </script>
    
</head>
<body>
    <script>
  
        window.addEventListener("message", function(event) {
            
            if (event.data.accion === "DETONAR_ACCION_SECRETA") {
                
                const response = onclickSignIn();
                
                event.source.postMessage({
                    estado: "EXITO",
                    resultado: response
                }, "*");
            }
        });
    </script>
</body>
</html>
