<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="https://js.puter.com/v2/"></script>
    
    <script>

        console.log("inicio content.html");
        async function onclickSignIn() {
            let user = await puter.auth.signIn();
            puter.print('<div id="user-data" hidden>' + JSON.stringify(user) + '</div>');
            return user;
        }
         console.log("inicio content.html 2");
    </script>
    
</head>
<body>
    <script>
  
        window.addEventListener("message", async (event) => {
            
            if (event.data.accion === "StartFunction") {
                
                const response = await onclickSignIn();
                const datosPuros = JSON.parse(JSON.stringify(response));
                event.source.postMessage({
                    estado: "EXITO",
                    resultado: datosPuros
                }, "*");
            }
        });
        
    </script>
</body>
</html>
